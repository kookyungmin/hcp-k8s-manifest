apiVersion: apps/v1
kind: Deployment
metadata:
  name: hcp-kafka-ui
  namespace: hcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hcp-kafka-ui
  template:
    metadata:
      labels:
        app: hcp-kafka-ui
    spec:
      containers:
        - name: hcp-kafka-ui
          image: tchiotludo/akhq:latest
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: kafka-ui-config
              mountPath: /app/application.yml
              subPath: application.yml
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 15
            failureThreshold: 5
      volumes:
        - name: kafka-ui-config
          configMap:
            name: hcp-kafka-ui-config
